name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # GitHub built-in secret scanning
      - name: Check for secrets
        run: |
          echo "Checking for exposed secrets..."
          
          # Check for common secret patterns in code
          patterns=(
            "AKIA[0-9A-Z]{16}"  # AWS Access Key
            "ghp_[a-zA-Z0-9]{36}"  # GitHub Personal Access Token
            "gho_[a-zA-Z0-9]{36}"  # GitHub OAuth
            "glpat-[a-zA-Z0-9\-]{20}"  # GitLab Token
            "sk-[a-zA-Z0-9]{48}"  # OpenAI API Key
            "sk-ant-[a-zA-Z0-9\-]{20,}"  # Anthropic API Key
          )
          
          for pattern in "${patterns[@]}"; do
            if grep -rE "$pattern" . --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" 2>/dev/null | grep -v node_modules | grep -v ".git"; then
              echo "WARNING: Possible secret found matching pattern: $pattern"
            fi
          done
          
          echo "Secret scan complete"
