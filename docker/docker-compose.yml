## VibeSDK Local Development Stack
##
## BuildKit is required for --mount=type=cache directives in Dockerfiles.
## Docker Compose v2 (docker compose, no hyphen) enables BuildKit automatically.
## Docker Compose v1 (docker-compose): set DOCKER_BUILDKIT=1 before running.
##
## Usage:
##   ./scripts/start.sh          # Start all services
##   ./scripts/stop.sh           # Stop all services
##   ./scripts/logs.sh           # View logs
##   ./scripts/rebuild.sh        # Rebuild and restart
##
## Or manually:
##   docker compose -f docker/docker-compose.yml up -d
##   docker compose -f docker/docker-compose.yml down
##
## Services:
##   - vibesdk: Main application (Vite + Wrangler)
##   - sandbox: Code execution sandbox (optional, --profile full)

version: '3.8'

# BuildKit inline cache — push cache metadata with images so remote pulls
# benefit from layer reuse (CI/CD and multi-developer environments).
x-build-defaults: &build-defaults
  args:
    BUILDKIT_INLINE_CACHE: "1"

services:
  # Main VibeSDK Application
  vibesdk:
    build:
      <<: *build-defaults
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    container_name: vibesdk-app
    ports:
      - "3000:3000"     # Main app (Vite dev server)
      - "8787:8787"     # Wrangler dev server (Workers backend)
      - "5555:5555"     # Drizzle Studio (database UI)
    volumes:
      - ..:/app
      - vibesdk_node_modules:/app/node_modules
      - vibesdk_bun_cache:/root/.bun
      - vibesdk_wrangler_state:/app/.wrangler
    env_file:
      - ../.dev.vars
    environment:
      - NODE_ENV=development
      - DEV_MODE=true
      - ENVIRONMENT=dev
    networks:
      - vibesdk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Code Execution Sandbox (Optional - for full functionality)
  sandbox:
    build:
      <<: *build-defaults
      context: ..
      dockerfile: SandboxDockerfile
    container_name: vibesdk-sandbox
    ports:
      - "8080:8080"     # Sandbox HTTP server
    volumes:
      - vibesdk_sandbox_data:/workspace/data
    environment:
      - SANDBOX_MODE=local
    networks:
      - vibesdk-network
    restart: unless-stopped
    profiles:
      - full  # Only starts with --profile full

networks:
  vibesdk-network:
    driver: bridge

volumes:
  vibesdk_node_modules:
    name: vibesdk_node_modules
  vibesdk_bun_cache:
    name: vibesdk_bun_cache
  vibesdk_wrangler_state:
    name: vibesdk_wrangler_state
  vibesdk_sandbox_data:
    name: vibesdk_sandbox_data
